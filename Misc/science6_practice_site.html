<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Science 6 Practice Questions</title>
<style>
  :root {
    --bg: #f4f7fb;
    --card: #ffffff;
    --ink: #18324a;
    --muted: #5d7186;
    --line: #d7e0ea;
    --accent: #2d6cdf;
    --accent-2: #1f4ea8;
    --good: #1f8f4e;
    --bad: #c0392b;
    --soft-good: #e9f8ef;
    --soft-bad: #fdeeee;
    --shadow: 0 10px 28px rgba(24, 50, 74, 0.08);
    --radius: 20px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #eef4fb 0%, #f7f9fc 100%);
    color: var(--ink);
  }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 18px 40px;
  }
  .hero {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 20px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: clamp(1.9rem, 3vw, 2.7rem);
    line-height: 1.1;
  }
  .sub {
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.5;
    margin: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 14px;
    margin-top: 18px;
  }
  .area-card {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    min-height: 132px;
  }
  .area-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .area-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(45,108,223,0.08);
  }
  .area-title {
    font-size: 1.15rem;
    font-weight: 700;
    margin: 0 0 10px;
  }
  .pill {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 999px;
    background: #edf3ff;
    color: var(--accent-2);
    font-weight: 700;
    font-size: .92rem;
  }
  .area-note {
    margin-top: 10px;
    color: var(--muted);
    font-size: .92rem;
    line-height: 1.35;
  }
  .controls {
    margin-top: 22px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .count-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .count-btn, .main-btn, .secondary-btn {
    border: none;
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .12s ease, opacity .12s ease, background .12s ease;
  }
  .count-btn {
    background: #e9eef5;
    color: var(--ink);
    min-width: 76px;
  }
  .count-btn.selected {
    background: var(--accent);
    color: white;
  }
  .main-btn {
    background: var(--accent);
    color: white;
    padding-inline: 24px;
  }
  .secondary-btn {
    background: #eef2f7;
    color: var(--ink);
  }
  button:hover { transform: translateY(-1px); }
  button:disabled {
    opacity: .55;
    cursor: not-allowed;
    transform: none;
  }
  .message {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 16px;
    background: #fff9e8;
    border: 1px solid #f0ddb0;
    color: #715a18;
    display: none;
  }
  .quiz-shell, .results-shell {
    display: none;
  }
  .quiz-topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(244,247,251,.95);
    backdrop-filter: blur(6px);
    padding: 12px 0;
  }
  .quiz-bar {
    background: var(--card);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    border-radius: 20px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .quiz-meta {
    font-weight: 700;
  }
  .quiz-sub {
    color: var(--muted);
    font-size: .95rem;
    margin-top: 4px;
  }
  .question-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: 20px;
    margin-top: 16px;
  }
  .q-num {
    font-weight: 700;
    color: var(--accent-2);
    margin-bottom: 10px;
    font-size: .98rem;
  }
  .q-text {
    margin: 0 0 16px;
    font-size: 1.08rem;
    line-height: 1.45;
    font-weight: 700;
  }
  .option {
    display: block;
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color .12s ease, background .12s ease;
  }
  .option:hover {
    border-color: #b8c6d8;
    background: #fafcff;
  }
  .option input {
    margin-right: 10px;
    transform: scale(1.15);
  }
  .submit-wrap {
    margin-top: 18px;
    display: flex;
    justify-content: center;
  }
  .submit-btn {
    width: min(340px, 100%);
    background: var(--good);
    color: white;
    border: none;
    border-radius: 18px;
    padding: 16px 18px;
    font-size: 1.08rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: var(--shadow);
  }
  .results-shell .hero {
    margin-bottom: 16px;
  }
  .score-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 18px;
  }
  .score-box {
    flex: 1 1 220px;
    background: #f7fbff;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px;
  }
  .score-label {
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .score-value {
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent-2);
  }
  .wrong-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 8px solid var(--bad);
    border-radius: 20px;
    padding: 18px;
    margin-top: 14px;
    box-shadow: var(--shadow);
  }
  .wrong-q {
    font-weight: 800;
    font-size: 1.02rem;
    margin: 0 0 12px;
    line-height: 1.45;
  }
  .answer-line {
    margin: 8px 0;
    line-height: 1.4;
  }
  .your-answer {
    color: var(--bad);
    font-weight: 700;
  }
  .correct-answer {
    color: var(--good);
    font-weight: 700;
  }
  .footer-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 18px;
  }
  .muted {
    color: var(--muted);
  }
  .empty {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 18px;
    padding: 18px;
    margin-top: 14px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <section id="setupView" class="setup-shell">
      <div class="hero">
        <h1>Science 6 Practice</h1>
        <p class="sub">Students can practise by area or from the entire curriculum. Pick an area, choose 10 or 25 questions, and complete everything on one page. Results will show the score, percentage, and any questions that were missed.</p>
        <div id="areaGrid" class="grid"></div>
        <div class="controls">
          <div class="count-group">
            <button class="count-btn" data-count="10">10 Questions</button>
            <button class="count-btn" data-count="25">25 Questions</button>
          </div>
          <button id="startBtn" class="main-btn" disabled>Start Practice</button>
        </div>
        <div id="messageBox" class="message"></div>
      </div>
    </section>

    <section id="quizView" class="quiz-shell">
      <div class="quiz-topbar">
        <div class="quiz-bar">
          <div>
            <div id="quizMeta" class="quiz-meta"></div>
            <div id="quizSub" class="quiz-sub"></div>
          </div>
          <button id="backBtn" class="secondary-btn">Back to Setup</button>
        </div>
      </div>
      <div id="quizQuestions"></div>
      <div class="submit-wrap">
        <button id="submitBtn" class="submit-btn">Submit Answers</button>
      </div>
    </section>

    <section id="resultsView" class="results-shell">
      <div class="hero">
        <h1>Practice Results</h1>
        <p id="resultsSummary" class="sub"></p>
        <div class="score-row">
          <div class="score-box">
            <div class="score-label">Correct</div>
            <div id="correctCount" class="score-value">0</div>
          </div>
          <div class="score-box">
            <div class="score-label">Percentage</div>
            <div id="percentValue" class="score-value">0%</div>
          </div>
        </div>
        <div class="footer-actions">
          <button id="newSetBtn" class="main-btn">Start New Practice Set</button>
          <button id="reviewBtn" class="secondary-btn">Jump to Missed Questions</button>
        </div>
      </div>
      <div id="wrongList"></div>
    </section>
  </div>

<script>
const QUESTION_BANK = [{"id": "S1", "area": "Space", "question": "A scientist discovers a celestial object that: Orbits a planet Is made of rock Does not produce its own light What is the object most likely to be?", "options": ["A star", "A comet", "A moon", "An asteroid"], "answerIndex": 2}, {"id": "S2", "area": "Ecosystems", "question": "A metal lid on a jar is stuck. To remove it you should:", "options": ["cool the lid", "heat the lid", "freeze the jar", "put soap on the lid"], "answerIndex": 1}, {"id": "S3", "area": "Ecosystems", "question": "Which ecosystem has the greatest biodiversity?", "options": ["boreal forest", "rainforest", "wetland", "arctic tundra"], "answerIndex": 1}, {"id": "S4", "area": "Climate / Weather", "question": "How can scientific understanding of the environmental impacts of fossil fuels be improved over time?", "options": ["By updating conclusions only when media reports change", "By testing and gathering new evidence regularly", "By relying only on early studies from decades ago", "By stopping research once a basic explanation is accepted"], "answerIndex": 1}, {"id": "S5", "area": "Matter / Temperature", "question": "Use the image of the outdoor thermometer to answer the question that follows. The statement that best matches the temperature on the thermometer is:", "options": ["\"There is ice on the pond.\"", "\"I don't need mittens today.\"", "\"Looks like it will rain today.\"", "\"There's a better chance of rain than snow.\""], "answerIndex": 0}, {"id": "S6", "area": "Forces", "question": "Lucas pushes a heavy box across the floor with his hand. What type of force is he applying to the box?", "options": ["An internal force", "A balanced force", "An external force", "An invisible force"], "answerIndex": 2}, {"id": "S7", "area": "Climate / Weather", "question": "Which of the following is an extreme weather event that occurs in Canada?", "options": ["blizzards", "monsoons", "sandstorms", "earthquakes"], "answerIndex": 0}, {"id": "S8", "area": "Climate / Weather", "question": "A local community is looking for ways to use energy resources more responsibly and reduce harm to the environment. Which of the following is the best example of responsible energy management?", "options": ["Restoring areas after resource extraction", "Decreasing the cost of non-renewable energy resources", "Using only non-renewable energy to reduce waste", "Dumping waste into rivers so it moves away from the community"], "answerIndex": 0}, {"id": "S9", "area": "Matter / Temperature", "question": "Read the scenario below and answer the question that follows. Amira heated a sealed container of water from 0°C to 100°C. She measured the mass before and after heating. She most likely observed that:", "options": ["the mass increased.", "the mass decreased.", "the mass stayed the same.", "the volume stayed the same."], "answerIndex": 2}, {"id": "S10", "area": "Forces", "question": "A company called SafePlay Designs is creating a new playground structure. The ropes need to safely support children as they climb, swing, and hang. The ropes should stretch a little for comfort but must return to their original shape without breaking or staying stretched out. Which combination of force and material property should SafePlay Designs focus on to make sure the ropes are safe and effective?", "options": ["Shear and plasticity", "Torsion and elasticity", "Tension and elasticity", "Compression and plasticity"], "answerIndex": 2}, {"id": "S11", "area": "Ecosystems", "question": "During an experiment, you add 125ml of tap water to each of three different 500 g soil samples, in identical pots. Each pot has been placed over a clear cup to collect the draining water. Soil sample A consists of fresh planting soil free of plants or roots; Soil sample B contains a single growing plant and its roots; Soil sample C is filled with grass shoots and their dense roots. After 2 minutes, you examine the water that has drained into each clear cup. You record the colour and clarity of this water. Which is a controlled variable in this experiment?", "options": ["the amount of soil in each pot", "the amount of roots in each pot", "the amount of water draining from each pot", "the amount of soil draining from each pot"], "answerIndex": 0}, {"id": "S12", "area": "Climate / Weather", "question": "An energy resource that requires processing before use is:", "options": ["Wood", "Wind", "Water", "Fossil fuels"], "answerIndex": 3}, {"id": "S13", "area": "Forces", "question": "An engineer is designing a bridge that will carry cars and trucks every day. They know that when vehicles pass over the bridge, they apply external forces. What must the engineer consider to make sure the bridge stays strong and safe?", "options": ["External forces don't affect large structures like bridges", "Only the weight of the bridge itself needs to be supported", "The bridge should be flexible enough to bend and twist easily", "The internal forces in the bridge materials must resist the external forces from the vehicles"], "answerIndex": 3}, {"id": "S14", "area": "Forces", "question": "Maya is competing in a challenge to build the strongest possible bridge out of uncooked spaghetti noodles. Her bridge needs to support as much weight as possible without snapping or collapsing. What combination of internal forces does Maya's bridge need to resist most?", "options": ["Shear and tension", "Torsion and tension", "Compression and shear", "Tension and compression"], "answerIndex": 3}, {"id": "S15", "area": "Forces", "question": "Two students each pull a sled using the same amount of force. One student pulls their sled across fresh snow, and the other pulls theirs across dry grass. Which sled will move more easily, and why?", "options": ["The sled on the grass, because grass creates less friction than snow", "The sled on the snow, because snow creates less friction than grass", "Both sleds will move the same, because they weigh the same", "Both sleds will stop quickly, because friction is the same on all surfaces"], "answerIndex": 1}, {"id": "S16", "area": "Ecosystems", "question": "After mining or drilling, restoring the area is an important step in responsible resource use. Why is restoring extraction sites important?", "options": ["To build more factories in the area", "To increase how much can be extracted", "To reduce the cost of getting resources", "To prevent environmental degradation"], "answerIndex": 3}, {"id": "S17", "area": "Matter / Temperature", "question": "When a pond freezes, the substance that forms on the surface is:", "options": ["ice", "snow", "steam", "bubbles"], "answerIndex": 0}, {"id": "S18", "area": "Climate / Weather", "question": "Climate change can be measured by observing changes in:", "options": ["sea and ocean levels.", "the height of buildings.", "the amount of dust in the air.", "the number of rainbows each year."], "answerIndex": 0}, {"id": "S19", "area": "Ecosystems", "question": "Which of the following would be the greatest obstacle to photosynthesis in a maple tree?", "options": ["a disease that turns the leaves brown", "a woodpecker drilling holes in the trunk", "humans harvesting the sap to make syrup", "humans harvesting some neighbouring trees"], "answerIndex": 0}, {"id": "S20", "area": "Climate / Weather", "question": "Scientists in northern Canada find that permafrost is melting faster than before. Melting permafrost impacts climate change by:", "options": ["making the ground more stable.", "releasing methane, a greenhouse gas.", "removes carbon dioxide from the atmosphere.", "reducing the amount of available ice to cool the planet."], "answerIndex": 1}, {"id": "S21", "area": "Matter / Temperature", "question": "Read the graph showing the temperature of a substance over time as it is heated. The section that represents a phase change is:", "options": ["after the flat line", "during the flat line", "before the flat line", "throughout the graph"], "answerIndex": 1}, {"id": "S22", "area": "Ecosystems", "question": "What would be the best way to reduce soil erosion in your yard?", "options": ["growing more plants", "watering more often", "removing large trees", "All these answers"], "answerIndex": 0}, {"id": "S23", "area": "Forces", "question": "Which of the following is an example of an external force acting on an object?", "options": ["A hand pushing a shopping cart forward", "Compression inside a sponge after it's been squeezed", "Tension within a rope pulled from both ends", "An elastic band pulling back on itself after being stretched"], "answerIndex": 0}, {"id": "S24", "area": "Space", "question": "Which of the following is the best example of a model that helps us understand how celestial bodies are arranged in space?", "options": ["A telescope used to look at stars", "A globe showing the continents and oceans of Earth", "A diagram showing planets and their orbits around the Sun", "A photograph of the night sky"], "answerIndex": 2}, {"id": "S25", "area": "Space", "question": "Which of the following celestial bodies is NOT located in the main asteroid belt?", "options": ["Ceres", "Vesta", "Pallas", "Halley's Comet"], "answerIndex": 3}, {"id": "S26", "area": "Climate / Weather", "question": "An energy resource that can be used before processing is:", "options": ["Coal", "Wind", "Solar", "Biofuel"], "answerIndex": 1}, {"id": "S27", "area": "Matter / Temperature", "question": "Which of the following devices uses wind energy directly, without first converting it to electricity or another form?", "options": ["A gas-powered car", "An electric blender", "A wind-powered sailboat", "A propane gas barbecue"], "answerIndex": 2}, {"id": "S28", "area": "Space", "question": "A class is asked to debate the question: \"Should people live permanently in space?\" The kind of evidence should they gather to discuss environmental barriers includes:", "options": ["The effects of isolation on astronauts during long space missions", "The type of transportation systems needed for interplanetary travel", "Health risks of radiation, air pressure challenges, and temperature extremes", "The average daily exercise routines needed to maintain health in space"], "answerIndex": 2}, {"id": "S29", "area": "Matter / Temperature", "question": "When most materials are heated, they:", "options": ["expand", "contract", "stay the same", "change shape completely"], "answerIndex": 0}, {"id": "S30", "area": "Climate / Weather", "question": "The thickness and duration of sea ice are important indicators of:", "options": ["climate change.", "the color of the ocean.", "the amount of plastic in the ocean.", "the number of animals in the Arctic."], "answerIndex": 0}, {"id": "S31", "area": "Forces", "question": "As cars and trucks drive across a bridge, different parts of the structure experience different internal forces. Which part of the bridge is most likely under tension?", "options": ["The top of a support beam directly under the road", "The sides of the bridge that face traffic", "The underside of the roadbed in the middle of the bridge", "The road surface where the tires touch"], "answerIndex": 2}, {"id": "S32", "area": "Matter / Temperature", "question": "Scenario: In an experiment, students froze 100 mL of water. After it became ice, the volume measured was 108 mL. What is a correct conclusion?", "options": ["Volume decreased", "Water lost mass", "Water gained energy", "Water expanded as it froze"], "answerIndex": 3}, {"id": "S33", "area": "Matter / Temperature", "question": "The tool would best help you measure temperature during a phase change is a:", "options": ["scale", "timer", "ruler", "thermometer"], "answerIndex": 3}, {"id": "S34", "area": "Climate / Weather", "question": "Climate change impacts crop selection by causing farmers to:", "options": ["grow different crops.", "stop farming altogether.", "ignore climate changes.", "grow the same crops as before."], "answerIndex": 0}, {"id": "S35", "area": "Space", "question": "Anna is comparing the four inner planets and notices that Mercury and Venus are both closer to the Sun than Earth. However, she learns that Venus is hotter than Mercury, even though Mercury is closer to the Sun. What is the best explanation for this?", "options": ["Venus rotates more slowly, so its surface gets hotter", "Mercury's surface is made of cooler materials than Venus", "Venus has a thick atmosphere that traps heat", "Mercury is always on the night side of the Sun"], "answerIndex": 2}, {"id": "S36", "area": "Matter / Temperature", "question": "Why does a solid change to a liquid when heated?", "options": ["particles move faster and break free", "particles move faster until they vanish", "particles combine because attraction increases", "particles cool down and the attraction increases"], "answerIndex": 0}, {"id": "S37", "area": "Matter / Temperature", "question": "An Inuit community has noticed that sea ice is forming later in the year and melting earlier than before. This change will likely impact their traditional way of life by:", "options": ["making travel safer on ice-covered areas.", "decreasing the amount of available fresh water.", "disrupting migration patterns of marine animals on which they rely.", "making hunting and fishing easier by having more available open water."], "answerIndex": 2}, {"id": "S38", "area": "Climate / Weather", "question": "A source of climate information is:", "options": ["the size of houses in a city.", "the number of animals in a zoo.", "the amount of people living in an area.", "stories passed down from Indigenous peoples."], "answerIndex": 3}, {"id": "S39", "area": "Matter / Temperature", "question": "The particle model of matter helps to explain:", "options": ["why some substances are sticky", "why some objects are magnetic or not", "how substances change state when heated or cooled", "how some substances change colour when heated or cooled"], "answerIndex": 2}, {"id": "S40", "area": "Ecosystems", "question": "Which is NOT an ani e form of:", "options": ["salt", "fat", "sugar", "chlorophyll"], "answerIndex": 2}, {"id": "S48", "area": "Matter / Temperature", "question": "One environmental benefit of ice being less dense than liquid water is:", "options": ["water warms faster", "ice reflects sunlight", "ice dissolves in water", "aquatic life survives winter"], "answerIndex": 3}, {"id": "S49", "area": "Space", "question": "Emma is creating a poster about solar energy for her school science fair. She wants to include both advantages and disadvantages. Which of the following is a real disadvantage of using solar energy?", "options": ["It is non-renewable", "It produces a lot of pollution", "It depends on sunlight availability", "It is the most expensive energy source"], "answerIndex": 2}, {"id": "S50", "area": "Matter / Temperature", "question": "Fish survive under the ice in winter because the ice:", "options": ["lets in sunlight", "provides food", "warms the water", "prevents freezing below"], "answerIndex": 3}, {"id": "S51", "area": "Forces", "question": "Ethan is designing a rubber toy that kids can twist, stretch, and squish without it breaking. What three internal forces must the toy be able to withstand?", "options": ["Torsion, tension, and friction", "Friction, shear, and elastic force", "Torsion, tension, and compression", "Shear, compression, and applied force"], "answerIndex": 2}, {"id": "S52", "area": "Forces", "question": "Jackson is designing a backpack with strong straps that won't snap, even when carrying heavy school supplies. What type of internal force do the straps need to resist when the backpack is lifted?", "options": ["Friction, because the straps rub against your shoulders", "Compression, because the backpack pushes down on itself", "Shear, because the straps twist as the backpack swings", "Tension, because the straps stretch when the backpack is lifted"], "answerIndex": 3}, {"id": "S53", "area": "Space", "question": "Why is cost considered a major societal barrier to sen function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function getAreaData(area) {
  if (area === "Entire Curriculum") return QUESTION_BANK;
  return QUESTION_BANK.filter(q => q.area === area);
}

function buildAreaCards() {
  areaGrid.innerHTML = "";
  AREA_ORDER.forEach(area => {
    const count = getAreaData(area).length;
    const card = document.createElement("button");
    card.type = "button";
    card.className = "area-card";
    card.innerHTML = `
      <div class="area-title">${area}</div>
      <div class="pill">${count} question${count === 1 ? "" : "s"}</div>
      <div class="area-note">${
        area === "Entire Curriculum"
          ? "Random questions from all science, computer science, and scientific method areas."
          : "Random questions from this area only."
      }</div>
    `;
    card.addEventListener("click", () => {
      selectedArea = area;
      [...document.querySelectorAll(".area-card")].forEach(c => c.classList.remove("selected"));
      card.classList.add("selected");
      updateStartState();
      hideMessage();
    });
    areaGrid.appendChild(card);
  });
}

function updateStartState() {
  startBtn.disabled = !(selectedArea && selectedCount);
}

function showMessage(text) {
  messageBox.style.display = "block";
  messageBox.textContent = text;
}

function hideMessage() {
  messageBox.style.display = "none";
  messageBox.textContent = "";
}

document.querySelectorAll(".count-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    selectedCount = Number(btn.dataset.count);
    document.querySelectorAll(".count-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    updateStartState();
    hideMessage();
  });
});

function buildQuiz() {
  const pool = getAreaData(selectedArea);
  const actualCount = Math.min(selectedCount, pool.length);
  currentAreaLabel = selectedArea;

  if (selectedCount > pool.length) {
    showMessage(`"${selectedArea}" currently has ${pool.length} unique question${pool.length === 1 ? "" : "s"} available, so this set will use all of them.`);
  } else {
    hideMessage();
  }

  currentQuiz = shuffleArray(pool).slice(0, actualCount).map((q, idx) => {
    const order = shuffleArray([0,1,2,3]);
    return {
      ...q,
      displayNumber: idx + 1,
      shuffledOrder: order,
      displayOptions: order.map(i => q.options[i])
    };
  });

  quizMeta.textContent = `${currentAreaLabel} • ${currentQuiz.length} Question${currentQuiz.length === 1 ? "" : "s"}`;
  quizSub.textContent = "Answer every question, then click Submit Answers at the bottom.";
  quizQuestions.innerHTML = "";

  currentQuiz.forEach((q, index) => {
    const card = document.createElement("div");
    card.className = "question-card";
    card.id = `question-card-${index}`;

    const optionsHTML = q.displayOptions.map((opt, optIndex) => {
      const inputId = `q${index}_opt${optIndex}`;
      return `
        <label class="option" for="${inputId}">
          <input type="radio" id="${inputId}" name="q${index}" value="${optIndex}">
          <span>${String.fromCharCode(65 + optIndex)}) ${opt}</span>
        </label>
      `;
    }).join("");

    card.innerHTML = `
      <div class="q-num">Question ${q.displayNumber}</div>
      <p class="q-text">${q.question}</p>
      <div>${optionsHTML}</div>
    `;

    quizQuestions.appendChild(card);
  });

  setupView.style.display = "none";
  resultsView.style.display = "none";
  quizView.style.display = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function getUserSelections() {
  return currentQuiz.map((q, quizIndex) => {
    const checked = document.querySelector(`input[name="q${quizIndex}"]:checked`);
    if (!checked) return null;
    return Number(checked.value);
  });
}

function submitQuiz() {
  const userSelections = getUserSelections();
  if (userSelections.some(v => v === null)) {
    showMessage("Please answer every question before submitting.");
    window.scrollTo({ top: 0, behavior: "smooth" });
    return;
  }

  hideMessage();

  let correct = 0;
  const missed = [];

  currentQuiz.forEach((q, idx) => {
    const selectedDisplayIndex = userSelections[idx];
    const selectedOriginalIndex = q.shuffledOrder[selectedDisplayIndex];
    const isCorrect = selectedOriginalIndex === q.answerIndex;
    if (isCorrect) {
      correct++;
    } else {
      missed.push({
        id: q.id,
        displayNumber: q.displayNumber,
        question: q.question,
        userAnswer: q.options[selectedOriginalIndex],
        correctAnswer: q.options[q.answerIndex]
      });
    }
  });

  lastMissedQuestionIds = missed.map(m => m.id);

  const percent = Math.round((correct / currentQuiz.length) * 100);
  correctCount.textContent = `${correct} / ${currentQuiz.length}`;
  percentValue.textContent = `${percent}%`;
  resultsSummary.textContent = `You completed ${currentAreaLabel} practice. Here is your score and a review of the questions you missed.`;

  wrongList.innerHTML = "";
  if (missed.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.innerHTML = `<strong>Awesome work!</strong><br>You got every question correct.`;
    wrongList.appendChild(empty);
  } else {
    missed.forEach(item => {
      const card = document.createElement("div");
      card.className = "wrong-card";
      card.id = `missed-${item.id}`;
      card.innerHTML = `
        <p class="wrong-q">Question ${item.displayNumber}: ${item.question}</p>
        <div class="answer-line"><span class="your-answer">Your answer:</span> ${item.userAnswer}</div>
        <div class="answer-line"><span class="correct-answer">Correct answer:</span> ${item.correctAnswer}</div>
      `;
      wrongList.appendChild(card);
    });
  }

  quizView.style.display = "none";
  resultsView.style.display = "block";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function backToSetup() {
  quizView.style.display = "none";
  resultsView.style.display = "none";
  setupView.style.display = "block";
  hideMessage();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function jumpToMissed() {
  if (!lastMissedQuestionIds.length) return;
  resultsView.style.display = "none";
  quizView.style.display = "block";
  const firstId = lastMissedQuestionIds[0];
  const index = currentQuiz.findIndex(q => q.id === firstId);
  const target = document.getElementById(`question-card-${index}`);
  if (target) {
    target.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

startBtn.addEventListener("click", buildQuiz);
submitBtn.addEventListener("click", submitQuiz);
backBtn.addEventListener("click", backToSetup);
newSetBtn.addEventListener("click", backToSetup);
reviewBtn.addEventListener("click", jumpToMissed);

buildAreaCards();

  const win = window.open('', '_blank');

    <head>
      <title>Results</title>
      <style>
        body { font-family: Arial; padding: 20px; }
        h1 { color: #2d6cdf; }
        .correct { color: green; }
        .wrong { color: red; }
      </style>
    </head>
    <body>
      ${resultsHtml}
    </body>
    </html>
  `);
  win.document.close();
}

</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const areaSelect = document.querySelector('#area, #subject, select[name="area"], select[name="subject"]');
  const countSelect = document.querySelector('#questionCount, #count, select[name="questionCount"], select[name="count"]');
  const infoEl = document.querySelector('#countHint, .count-hint');

  function syncCountOptions() {
    if (!areaSelect || !countSelect) return;
    const v = String(areaSelect.value || '').toLowerCase();
    const full = v === 'full' || v === 'entire' || v === 'all';
    const opt25 = Array.from(countSelect.options).find(o => String(o.value) === '25');
    if (opt25) opt25.disabled = !full;
    if (!full) countSelect.value = '10';
    if (infoEl) {
      infoEl.textContent = full
        ? 'Full curriculum: choose 10 or 25 questions.'
        : 'Subject practice: 10 questions per subject.';
    }
  }

  if (areaSelect && countSelect) {
    areaSelect.addEventListener('change', syncCountOptions);
    syncCountOptions();
  }
});

    </html>
  `);

}
