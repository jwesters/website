function buildRowsFromPuzzle(text,max=14){
  const words=text.split(" ");
  const rows=[];
  let current="";
  for(const word of words){
    if(!current){ current=word; }
    else if((current+" "+word).length<=max){ current += " " + word; }
    else { rows.push(current); current=word; }
  }
  if(current) rows.push(current);
  return rows;
}

function drawBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";
  const rows=buildRowsFromPuzzle(puzzle,14);
  let globalIndex=0;

  for(const rowText of rows){
    const row=document.createElement("div");
    row.className="boardRow";

    for(let i=0;i<rowText.length;i++){
      const ch=rowText[i];
      const el=document.createElement("div");
      if(ch===" "){
        el.className="space";
      }else{
        el.className="tile";
        while(globalIndex < puzzle.length && puzzle[globalIndex]===" "){ globalIndex++; }
        el.textContent = revealed[globalIndex] ? puzzle[globalIndex] : "";
        globalIndex++;
      }
      row.appendChild(el);
    }

    board.appendChild(row);

    while(globalIndex < puzzle.length && puzzle[globalIndex]===" "){ globalIndex++; }
  }
}

function getTargetRotationForIndex(index){

function updatePowerUI(power){

  const txt=document.getElementById("powerText");
  if(bar) bar.style.width=pct+"%";
  if(txt) txt.textContent=`Spin power: ${pct}%`;
}

function performSpin(power){
  if(spinning||roundEnded) return;
  if(turnState!=="awaitSpin"){speak("You need to use your current turn first."); return;}

  power=Math.max(0, Math.min(1, power));
  spinning=true;
  updateControlStates();
  speak(`${players[currentPlayer].name} spins the wheel...`);
  beep(320,.08,"triangle",.02);

  const targetIndex=Math.floor(Math.random()*WHEEL.length);
  wheelValue=WHEEL[targetIndex];

  const full=2*Math.PI;
  const startRot=rotation;
  const baseTarget=getTargetRotationForIndex(targetIndex);

  let delta = baseTarget - startRot;
  while(delta <= 0){ delta += full; }

  const extraTurns = Math.floor(3 + power*5);
  const endRot = startRot + delta + full*extraTurns;

  const startTime=performance.now();
  const duration=1600 + power*1400;

  function frame(now){
    const t=Math.min(1,(now-startTime)/duration);
    const eased=1-Math.pow(1-t,3);
    rotation=startRot+(endRot-startRot)*eased;
    drawWheel();
    if(t<1){
      requestAnimationFrame(frame);
    }else{
      rotation=endRot;
      drawWheel();
      spinning=false;
      document.getElementById("spinResult").textContent=`Spin result: ${wheelValue}`;
      updatePowerUI(power);
      resolveSpin();
    }
  }
  requestAnimationFrame(frame);
}

function startHoldSpin(ev){
  if(ev) ev.preventDefault();
  if(spinning||roundEnded) return;
  if(turnState!=="awaitSpin"){speak("You need to use your current turn first."); return;}
  holdActive=true;
  holdStart=performance.now();
  updatePowerUI(0);
  speak("Hold to build spin power, then release.");
  if(holdAnim) cancelAnimationFrame(holdAnim);

  function tick(){
    if(!holdActive) return;
    const power=Math.min(1, Math.max(0, performance.now()-holdStart)/1800);
    updatePowerUI(power);
    holdAnim=requestAnimationFrame(tick);
  }
  holdAnim=requestAnimationFrame(tick);
}

function releaseHoldSpin(ev){
  if(ev) ev.preventDefault();
  if(!holdActive) return;
  holdActive=false;
  if(holdAnim) cancelAnimationFrame(holdAnim);
  const power=Math.min(1, Math.max(0, performance.now()-holdStart)/1800);
  performSpin(power);
}

function autoSpin(){
  performSpin(0.45 + Math.random()*0.45);
}

function resolveSpin(){

function handleLetter(letter){

function solvePuzzleCpuWrong(){speak("CPU tried to solve and missed."); beep(190,.14,"square",.03); setTimeout(nextTurn,700);}
function updatePlayers(){
  const box=document.getElementById("players"); box.innerHTML="";
  players.forEach((p,idx)=>{
    const row=document.createElement("div");
    row.className="playerRow"+(idx===currentPlayer?" current":"");
    row.innerHTML=`<div><strong>${idx===currentPlayer?"▶ ":""}${p.name}</strong> ${p.cpu?'<span style="font-size:.85rem;padding:4px 8px;border-radius:999px;background:#e5e7eb">CPU</span>':''}</div><div><strong>Total: $${p.score}</strong><div style="font-size:.9rem;color:#6b7280">Round: $${p.roundScore}</div></div>`;
    box.appendChild(row);
  });
}
function updateControlStates(){
  const humanTurn=!players[currentPlayer].cpu;
  document.getElementById("spinBtn").disabled=!humanTurn||spinning||roundEnded||turnState!=="awaitSpin";
  document.getElementById("buyBtn").disabled=!humanTurn||spinning||roundEnded||turnState!=="awaitSpin"||players[currentPlayer].roundScore<250;
  document.getElementById("solveBtn").disabled=!humanTurn||spinning||roundEnded;
  updateLetterButtons();
}
function endGame(){
  const sorted=[...players].sort((a,b)=>b.score-a.score), winner=sorted[0], bestKey="wheel_classroom_best_score", oldBest=parseInt(localStorage.getItem(bestKey)||"0",10);
  if(winner.score>oldBest) localStorage.setItem(bestKey,String(winner.score));
  const best=parseInt(localStorage.getItem(bestKey)||"0",10);
  alert(`Winner: ${winner.name} with $${winner.score}\nBest local winning score: $${best}`);
  location.reload();
}
drawWheel();
const spinBtn=document.getElementById("spinBtn");
if(spinBtn){
  spinBtn.addEventListener("pointerdown", startHoldSpin);
  spinBtn.addEventListener("pointerup", releaseHoldSpin);
  spinBtn.addEventListener("pointerleave", releaseHoldSpin);
  spinBtn.addEventListener("pointercancel", releaseHoldSpin);
  spinBtn.addEventListener("mousedown", startHoldSpin);
  spinBtn.addEventListener("mouseup", releaseHoldSpin);
  spinBtn.addEventListener("mouseleave", releaseHoldSpin);
  spinBtn.addEventListener("touchstart", startHoldSpin, {passive:false});
  spinBtn.addEventListener("touchend", releaseHoldSpin, {passive:false});
  spinBtn.addEventListener("touchcancel", releaseHoldSpin, {passive:false});
}
document.addEventListener("mouseup", releaseHoldSpin);
document.addEventListener("touchend", releaseHoldSpin, {passive:false});
